# 开发环境配置

spring:
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/admin_boot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: ${REDIS_PASSWORD:}

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发环境打印 SQL 便于调试

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# 安全配置
security:
  white-list:
    - /api/auth/**
    - /doc.html
    - /swagger-ui/**
    - /swagger-ui.html
    - /v3/api-docs/**
    - /v3/api-docs.yaml
    - /webjars/**
    - /actuator/health

# 跨域配置（开发环境：宽松策略）
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:8080
    - http://localhost:5173  # Vite 默认端口
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  # 明确列出允许的请求头，而不是使用通配符
  allowed-headers:
    - Authorization
    - Content-Type
    - X-Requested-With
    - X-Trace-Id
    - Accept
  allow-credentials: true
  max-age: 3600

# JWT 配置（开发环境使用）
jwt:
  secret: ${JWT_SECRET:dev-secret-key-for-development-only-change-in-production-at-least-32-characters}

# 日志配置
logging:
  level:
    root: INFO
    com.admin: DEBUG
    com.admin.mapper: DEBUG
    org.springframework.web: DEBUG
