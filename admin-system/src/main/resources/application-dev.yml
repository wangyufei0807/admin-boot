# 开发环境配置

spring:
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/admin_boot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印 SQL

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# 安全配置
security:
  white-list:
    - /api/auth/**
    - /doc.html
    - /swagger-ui/**
    - /swagger-ui.html
    - /v3/api-docs/**
    - /v3/api-docs.yaml
    - /webjars/**
    - /actuator/health

# 跨域配置
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:8080
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers:
    - "*"
  allow-credentials: true
  max-age: 3600

# JWT 配置（开发环境使用，仅本地开发）
# 生产环境请通过环境变量 JWT_SECRET 覆盖
jwt:
  secret: ${JWT_SECRET:d3Y1LWVudjItc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi1hbmQtdXNlLWVudjItc2VjcmV0}

# 日志配置
logging:
  level:
    root: INFO
    com.admin: DEBUG
    com.admin.mapper: DEBUG
    org.springframework.web: DEBUG
