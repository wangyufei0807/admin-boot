# 生产环境配置

spring:
  # 数据源配置
  datasource:
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000

  # Redis 配置
  data:
    redis:
      database: 1
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl  # 不打印 SQL
  global-config:
    banner: false

# Knife4j 配置（生产环境关闭）
knife4j:
  enable: false

# 安全配置
security:
  white-list:
    - /api/auth/**
    - /doc.html
    - /swagger-ui/**
    - /swagger-ui.html
    - /v3/api-docs/**
    - /v3/api-docs.yaml
    - /webjars/**

# 跨域配置
cors:
  allowed-origins:
    - https://your-domain.com
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers:
    - Authorization
    - Content-Type
    - X-Requested-With
    - X-Trace-Id
  allow-credentials: true
  max-age: 3600

# 接口限流配置
rate-limit:
  enabled: true
  login:
    max-requests: 5
    window-seconds: 60
  api:
    max-requests: 100
    window-seconds: 60

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# 日志配置
logging:
  level:
    root: INFO
    com.admin: INFO
    com.admin.mapper: INFO
    org.springframework.web: INFO
  file:
    path: /var/log/admin-boot
    name: ${logging.file.path}/application.log
