# 生产环境配置
# ⚠️ 重要：所有敏感配置必须通过环境变量设置，不能硬编码

spring:
  # 数据源配置
  datasource:
    # URL、用户名、密码必须通过环境变量注入（application.yml 中定义）
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
      # 生产环境启用连接验证
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000

  # Redis 配置
  data:
    redis:
      # 主机、端口、密码通过环境变量注入
      database: 1
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms
        shutdown-timeout: 200ms

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl  # 不打印 SQL 日志
  global-config:
    banner: false

# Knife4j 配置（生产环境关闭 API 文档）
knife4j:
  enable: false

# 安全配置
security:
  white-list:
    - /api/auth/**

# 跨域配置（生产环境：严格策略）
cors:
  allowed-origins:
    - https://your-domain.com
    - https://api.your-domain.com
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  # 明确列出需要的请求头，不使用通配符
  allowed-headers:
    - Authorization
    - Content-Type
    - X-Requested-With
    - X-Trace-Id
  allow-credentials: true
  max-age: 3600

# 接口限流配置
rate-limit:
  enabled: true
  login:
    max-requests: 5
    window-seconds: 60
  api:
    max-requests: 100
    window-seconds: 60

# Actuator 配置（生产环境：最小化暴露）
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      # 生产环境：不显示详细的健康信息
      show-details: never
    shutdown:
      enabled: false

# 日志配置
logging:
  level:
    root: INFO
    com.admin: INFO
    com.admin.mapper: INFO
    org.springframework.web: WARN
  file:
    path: /var/log/admin-boot
    name: ${logging.file.path}/application.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 10GB
